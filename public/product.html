<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — CodeAlpha Pro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="product-detail" id="product-detail">
  <div class="loading"><div class="spinner"></div></div>
</div>

<footer>
  <div class="footer-bottom">
    <p>© 2025 CodeAlpha E-commerce Pro</p>
    <div class="developer-info">Developed by <strong>sanjana kumari</strong> | <a href="mailto:mdaimanshafi492@gmail.com">mdaimanshafi492@gmail.com</a></div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  async function loadProduct() {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) return window.location.href = '/index.html';
    const p = await API.get('/products/' + id);
    if (p.error) return window.location.href = '/index.html';
    document.title = p.name + ' — CodeAlpha Pro';
    const discount = calcDiscount(p.price, p.originalPrice);
    document.getElementById('product-detail').innerHTML = `
      <div style="margin-bottom:16px">
        <a href="/index.html" style="color:var(--primary);font-size:14px">← Back to Products</a>
      </div>
      <div class="detail-grid">
        <div>
          <img class="detail-img" src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/500x400?text=Product'">
        </div>
        <div>
          ${p.badge ? `<div class="detail-badge">${p.badge}</div>` : ''}
          <h1 class="detail-name">${p.name}</h1>
          <div class="detail-rating">
            <span class="stars" style="font-size:18px">${renderStars(p.rating)}</span>
            <span style="font-weight:700">${p.rating}</span>
            <span style="color:var(--text-light);font-size:14px">(${p.reviews.toLocaleString()} reviews)</span>
          </div>
          <div class="detail-price">
            <span class="current">${fmt(p.price)}</span>
            <span class="original">${fmt(p.originalPrice)}</span>
            <span class="discount">${discount}% off</span>
          </div>
          <p class="detail-desc">${p.description}</p>
          <div class="detail-stock ${p.stock > 0 ? 'in' : 'out'}">
            ${p.stock > 0 ? `✅ In Stock (${p.stock} available)` : '❌ Out of Stock'}
          </div>
          <div class="detail-actions">
            <button class="btn-detail cart" onclick="addToCart()" ${p.stock === 0 ? 'disabled' : ''}>🛒 Add to Cart</button>
            <button class="btn-detail buy" onclick="buyNow()" ${p.stock === 0 ? 'disabled' : ''}>⚡ Buy Now</button>
          </div>
        </div>
      </div>`;

    window._product = p;
  }

  function addToCart() {
    Cart.add(window._product);
  }

  function buyNow() {
    Cart.add(window._product);
    window.location.href = '/cart.html';
  }

  loadProduct();
</script>
</body>
</html>
