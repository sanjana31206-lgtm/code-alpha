<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CodeAlpha Pro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-container">
  <h1 class="page-title">👤 My Dashboard</h1>
  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <div class="dash-sidebar">
      <div class="dash-user">
        <div class="dash-avatar" id="dash-avatar">?</div>
        <div class="dash-name" id="dash-name">Loading...</div>
        <div class="dash-email" id="dash-email"></div>
      </div>
      <ul class="dash-nav">
        <li><a href="#" class="active" onclick="showSection('orders', this)">📦 My Orders</a></li>
        <li><a href="#" onclick="showSection('profile', this)">👤 Profile</a></li>
        <li><a href="/index.html">🛍️ Continue Shopping</a></li>
        <li><a href="#" class="text-danger" onclick="logout()">🚪 Logout</a></li>
      </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="dash-content" id="dash-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-bottom">
    <p>© 2025 CodeAlpha E-commerce Pro</p>
    <div class="developer-info">Developed by <strong>sanjana kumari</strong> | <a href="mailto:mdaimanshafi492@gmail.com">mdaimanshafi492@gmail.com</a></div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  let userOrders = [];

  async function init() {
    if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
    const user = Auth.get();
    document.getElementById('dash-avatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('dash-name').textContent = user.name;
    document.getElementById('dash-email').textContent = user.email;
    userOrders = await API.get('/orders?email=' + encodeURIComponent(user.email));
    showSection('orders');
  }

  function showSection(section, link) {
    document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
    if (link) link.classList.add('active');
    if (section === 'orders') renderOrders();
    else renderProfile();
  }

  function renderOrders() {
    const content = document.getElementById('dash-content');
    if (!userOrders.length) {
      content.innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:56px;margin-bottom:16px">📦</div>
          <h3 style="margin-bottom:8px">No orders yet</h3>
          <p style="color:var(--text-light);margin-bottom:24px">Start shopping to see your orders here</p>
          <a href="/index.html" style="padding:12px 28px;background:var(--primary);color:white;border-radius:8px;font-weight:600">Shop Now</a>
        </div>`;
      return;
    }
    content.innerHTML = `
      <h3 style="margin-bottom:20px">📦 My Orders (${userOrders.length})</h3>
      ${[...userOrders].reverse().map(order => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">${order.orderId}</div>
              <div style="font-size:12px;color:var(--text-light)">${new Date(order.timestamp).toLocaleString('en-IN')}</div>
            </div>
            <span class="order-status">✅ ${order.status}</span>
          </div>
          <div class="order-items">
            ${order.products.map(p => `${p.name} ×${p.qty}`).join(' · ')}
          </div>
          <div class="order-footer">
            <span>${order.products.length} item${order.products.length > 1 ? 's' : ''}</span>
            <span class="order-total">${fmt(order.totalPrice)}</span>
          </div>
        </div>`).join('')}`;
  }

  function renderProfile() {
    const user = Auth.get();
    document.getElementById('dash-content').innerHTML = `
      <h3 style="margin-bottom:20px">👤 My Profile</h3>
      <div style="background:var(--bg);border-radius:12px;padding:24px;max-width:480px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
          <div class="dash-avatar" style="width:60px;height:60px;font-size:24px">${user.name.charAt(0).toUpperCase()}</div>
          <div>
            <div style="font-size:20px;font-weight:700">${user.name}</div>
            <div style="color:var(--text-light);font-size:14px">Member</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;justify-content:space-between;padding:12px;background:white;border-radius:8px">
            <span style="color:var(--text-light);font-size:14px">Full Name</span>
            <span style="font-weight:600">${user.name}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:white;border-radius:8px">
            <span style="color:var(--text-light);font-size:14px">Email</span>
            <span style="font-weight:600">${user.email}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:white;border-radius:8px">
            <span style="color:var(--text-light);font-size:14px">Total Orders</span>
            <span style="font-weight:600;color:var(--primary)">${userOrders.length}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:white;border-radius:8px">
            <span style="color:var(--text-light);font-size:14px">Total Spent</span>
            <span style="font-weight:600;color:var(--primary)">${fmt(userOrders.reduce((s, o) => s + o.totalPrice, 0))}</span>
          </div>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
