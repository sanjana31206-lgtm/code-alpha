<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CodeAlpha Pro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>CodeAlpha <span>Pro</span></h2>
      <p style="font-size:13px;color:var(--text-light);margin-top:4px">Your Smart Shopping Destination</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-auth" id="login-btn">Login →</button>
      <div class="auth-msg">Don't have an account? <a href="#" onclick="switchTab('signup')" style="color:var(--primary)">Sign up free</a></div>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display:none" onsubmit="doSignup(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <button type="submit" class="btn-auth" id="signup-btn">Create Account →</button>
      <div class="auth-msg">Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--primary)">Login</a></div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;
    const res = await API.post('/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value
    });
    if (res.error) {
      showToast(res.error, 'error');
      btn.textContent = 'Login →';
      btn.disabled = false;
    } else {
      Auth.set(res.user);
      showToast('Welcome back, ' + res.user.name + '!', 'success');
      setTimeout(() => window.location.href = '/index.html', 800);
    }
  }

  async function doSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    btn.textContent = 'Creating account...';
    btn.disabled = true;
    const res = await API.post('/register', {
      name: document.getElementById('signup-name').value,
      email: document.getElementById('signup-email').value,
      password: document.getElementById('signup-password').value
    });
    if (res.error) {
      showToast(res.error, 'error');
      btn.textContent = 'Create Account →';
      btn.disabled = false;
    } else {
      showToast('Account created! Please login.', 'success');
      setTimeout(() => switchTab('login'), 800);
    }
  }
</script>
</body>
</html>
